<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Tasks – a beautiful, modern Flutter web To-Do application.">
  <title>Smart Tasks</title>

  <!-- Inter font from Google Fonts for elegant typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Reset and base styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: #F8F9FF;
      font-family: 'Inter', sans-serif;
    }

    /* Loading screen shown before Flutter initialises */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F8F9FF;
      gap: 16px;
      z-index: 9999;
    }

    #loading .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #5C6BC0 0%, #26C6DA 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(92,107,192,.35);
    }

    #loading p {
      font-size: 14px;
      color: #6B7280;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #EEF0FC;
      border-top-color: #5C6BC0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hide loader once Flutter fires flutter-first-frame */
    .loaded #loading { display: none; }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <div class="logo">✅</div>
    <div class="spinner"></div>
    <p>Loading Smart Tasks…</p>
  </div>

  <script>
    // Remove loading screen after Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', () => {
      document.body.classList.add('loaded');
    });
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
